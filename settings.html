<div class="stmr-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>多候选回复</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <p class="stmr-help">
                这个扩展会在聊天输入区旁边加一个按钮。点击后会打开一个上方写草稿、下方看候选的工作台；
                生成时会尽量用你的第一人称口吻来写，不是站在助手视角解释。
            </p>

            <div class="stmr-settings-grid">
                <label class="checkbox_label">
                    <input id="stmr_settings_enabled" type="checkbox" />
                    <span>显示输入区快捷按钮</span>
                </label>

                <label>
                    <span>默认候选数</span>
                    <input id="stmr_settings_reply_count" class="text_pole" type="number" min="1" max="12" step="1" />
                </label>

                <label>
                    <span>生成长度上限</span>
                    <input id="stmr_settings_response_length" class="text_pole" type="number" min="16" max="1000" step="1" />
                </label>
            </div>

            <label>
                <span>长度要求</span>
                <input
                    id="stmr_settings_length_instruction"
                    class="text_pole"
                    type="text"
                    placeholder="例如：每条 40-80 字，像我本人会发出的聊天消息。"
                />
            </label>

            <label class="checkbox_label">
                <input id="stmr_settings_use_input_draft" type="checkbox" />
                <span>将输入框当前内容作为草稿/意图参考</span>
            </label>

            <label>
                <span>风格列表（每行一个）</span>
                <textarea
                    id="stmr_settings_styles_text"
                    class="text_pole textarea_compact"
                    rows="8"
                    placeholder="自然口吻&#10;温柔体贴&#10;俏皮可爱"
                ></textarea>
            </label>

            <label>
                <span>额外要求</span>
                <textarea
                    id="stmr_settings_extra_instructions"
                    class="text_pole textarea_compact"
                    rows="4"
                    placeholder="例如：别太油，保留我的语气，不要写成旁白。"
                ></textarea>
            </label>

            <div class="stmr-settings-actions">
                <button id="stmr_open_panel" class="menu_button">打开工作台</button>
                <button id="stmr_generate_from_settings" class="menu_button">立即生成候选</button>
            </div>
        </div>
    </div>
</div>
